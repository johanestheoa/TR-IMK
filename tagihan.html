<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tagihan — SIA.Sat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
</head>
<body data-page="tagihan">

<div class="app">
  <header class="topbar" id="topbar"></header>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <h1 class="page-title">Tagihan</h1>
      <div style="height:14px"></div>

      <div class="card">
        <div class="table-wrap">
          <table class="data">
            <thead>
              <tr><th class="num">No</th><th>Item</th><th class="right">Jumlah</th></tr>
            </thead>
            <tbody>
              <tr><td class="num">01</td><td>Denda</td><td class="right">Rp. 0,-</td></tr>
              <tr><td class="num">02</td><td>Uang Kuliah</td><td class="right">Rp. 6.300.000,-</td></tr>
              <tr><td class="num">03</td><td>SPP / BPP</td><td class="right">Rp. 1.750.000,-</td></tr>
              <tr style="font-weight:700;"><td colspan="2" class="right">Total Utang</td><td class="right">Rp. 8.050.000,-</td></tr>
              <tr style="font-weight:700;"><td colspan="2" class="right">Terbayar</td><td class="right">Rp. 8.050.000,-</td></tr>
              <tr style="font-weight:700;"><td colspan="2" class="right">Yang harus di bayar</td><td class="right">Rp. 0,-</td></tr>
              <tr><td colspan="2">Jatuh Tempo</td><td class="right">01 Apr 2026</td></tr>
              <tr><td colspan="2">Jatuh Tempo Pelunasan</td><td class="right">12 Apr 2026</td></tr>
            </tbody>
          </table>
        </div>

        <p style="color:var(--red-text); font-weight:600; margin:16px 0 22px;">*Belum termasuk denda yang harus dibayar</p>

        <div style="display:flex; gap:14px;">
          <button class="btn btn-secondary" style="max-width:140px;" onclick="window.location.href='dashboard.html'">Batal</button>
          <button class="btn btn-primary" style="max-width:140px;" onclick="window.location.href='pembayaran_tagihan.html'">Bayar</button>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/global.js"></script>
</body>
</html>
