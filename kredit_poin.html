<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keaktifan Mahasiswa — SIA.Sat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
</head>
<body data-page="kredit_poin">

<div class="app">
  <header class="topbar" id="topbar"></header>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <h1 class="page-title">Kredit Keaktifan Mahasiswa</h1>
      <div style="height:16px"></div>

      <div class="tabs">
        <button class="tab">Transkrip KKM</button>
        <button class="tab">Pengajuan Poin KKM</button>
        <button class="tab active">Pedoman Poin KKM</button>
        <button class="tab">Panduan Input KKM</button>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="data">
            <thead>
              <tr><th class="num">No</th><th>Rumpun</th><th class="right">Poin Minimal</th><th class="right">Poin</th></tr>
            </thead>
            <tbody>
              <tr><td class="num">01</td><td>ORIENTASI MAHASISWA BARU</td><td class="right">150 POIN</td><td class="right">0</td></tr>
              <tr><td class="num">02</td><td>KETERAMPILAN PROFESIONAL</td><td class="right">300 POIN</td><td class="right">0</td></tr>
              <tr><td class="num">03</td><td>KETERAMPILAN BERSIFAT KEMANUSIAAN</td><td class="right">250 POIN</td><td class="right">0</td></tr>
              <tr><td class="num">04</td><td>KETERAMPILAN PENUNJANG</td><td class="right">0 POIN</td><td class="right">0</td></tr>
              <tr><td class="num">05</td><td>PENGEMBANGAN KARIR</td><td class="right">0 POIN</td><td class="right">0</td></tr>
              <tr style="font-weight:700;"><td colspan="2" class="right">TOTAL POIN</td><td></td><td class="right">0</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/global.js"></script>
</body>
</html>
