<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — SIA.Sat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
</head>
<body>  

<div class="guest-bg">
  <div class="guest-card">
    <div class="guest-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="52" height="52">
        <path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1.7 2.7 3 6 3s6-1.3 6-3v-5"/>
      </svg>
    </div>
    <p class="guest-title">Sistem Informasi Akademik</p>
    <p class="guest-sub">Satya Wacana</p>
    <p>Silahkan Buat Akun!</p>
    <div style="height:14px"></div>

    <form id="registerForm" novalidate>
      <div class="form-grid">
        <input id = "nim"
        class="field" 
        type="text" 
        placeholder="NIM" 
        required>

      <input id="nama"
      class="field" 
      type="text" 
      placeholder="Nama Lengkap" 
      required>
      <input id="tempat_lahir" 
      class="field" 
      type="text" 
      placeholder="Tempat Lahir" 
      required>

      <div>
        <label class="field-label">Tanggal Lahir</label>
        <input id="tanggal_lahir" 
        class="field" 
        type="date" 
        required>

      </div>
      
      <select id="jenis_kelamin" 
      class="field" 
      required>
        <option value="" selected disabled hidden>Jenis Kelamin</option>
        <option value="L">Laki-laki</option>
        <option value="P">Perempuan</option>
      </select>

      <select id="agama" 
      class="field" 
      required>
        <option value="" selected disabled hidden>Agama</option>
        <option>Kristen</option>
        <option>Katholik</option>
        <option>Islam</option>
        <option>Hindu</option>
        <option>Buddha</option>
        <option>Konghucu</option>
        <option>Yang Lain</option>
      </select>

      <input id="domisili" 
      class="field" 
      type="text" 
      placeholder="Domisili" 
      required>

      <input id="no_hp" 
      class="field" 
      type="text" 
      placeholder="No. Handphone" 
      required>

      <input id="jenjang" 
      class="field" 
      type="text" 
      placeholder="Jenjang" 
      required>

      <input id="fakultas" 
      class="field" 
      type="text" 
      placeholder="Fakultas" 
      required>

      <input id="prodi" 
      class="field" 
      type="text" 
      placeholder="Prodi" 
      required>

      <input id="angkatan" 
      class="field" 
      type="text" 
      placeholder="Angkatan" 
      required>

      <input id="wali_studi" 
      class="field" 
      type="text" 
      placeholder="Wali Studi" 
      required>
      </div>
    </form>

    <button type="submit" form = "registerForm" class="btn btn-outline"> Buat Akun</button>

  </div>
</div>

<script src="js/global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/database.js"></script>

</body>
</html>
