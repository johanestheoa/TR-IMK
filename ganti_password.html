<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganti Password — SIA.Sat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
</head>
<body data-page="ganti_password">

<div class="app">
  <header class="topbar" id="topbar"></header>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <h1 class="page-title">Ganti Password</h1>
      <div style="height:10px"></div>

      <div class="card" style="background:#f2f7f3; max-width:820px;">
        <form id="gantiPasswordForm" novalidate>
          <div class="form-field" style="margin-bottom:18px;">
            <label>Password Saat ini</label>
            <input class="field" type="password" id="passwordSaatIni" required>
          </div>
          <div class="form-field" style="margin-bottom:18px;">
            <label>Password Baru</label>
            <input class="field" type="password" id="passwordBaru" required>
          </div>
          <div class="form-field" style="margin-bottom:18px;">
            <label>Konfirmasi Password Baru</label>
            <input class="field" type="password" id="passwordKonfirmasi" required>
          </div>

          <div class="card" style="background:#fff; margin-bottom:20px;">
            <p style="font-weight:700; margin:0 0 14px;">Ketentuan Password</p>
            <div class="form-grid" style="gap:10px 28px;">
              <label class="pw-rule" data-rule="length" style="display:flex; align-items:center; gap:10px; font-weight:500;">
                <input type="checkbox" disabled> Minimal 8 karakter
              </label>
              <label class="pw-rule" data-rule="number" style="display:flex; align-items:center; gap:10px; font-weight:500;">
                <input type="checkbox" disabled> Mengandung angka
              </label>
              <label class="pw-rule" data-rule="case" style="display:flex; align-items:center; gap:10px; font-weight:500;">
                <input type="checkbox" disabled> Mengandung huruf besar dan huruf kecil
              </label>
              <label class="pw-rule" data-rule="symbol" style="display:flex; align-items:center; gap:10px; font-weight:500;">
                <input type="checkbox" disabled> Mengandung simbol (!@#$%)
              </label>
            </div>
          </div>

          <div style="display:flex; gap:14px;">
            <button class="btn btn-primary" type="submit" style="max-width:220px;">Simpan Password Baru</button>
            <button class="btn btn-outline" type="button" style="max-width:120px;" onclick="window.location.href='dashboard.html'">Batal</button>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<script src="js/global.js"></script>
</body>
</html>
