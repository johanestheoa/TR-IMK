<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengajuan Dispensasi — SIA.Sat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
</head>
<body data-page="pengajuan_dispensasi">

<div class="app">
  <header class="topbar" id="topbar"></header>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <h1 class="page-title">Pengajuan Dispensasi</h1>
      <div style="height:14px"></div>

      <div class="info-card">
        <div class="logo-cell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1.7 2.7 3 6 3s6-1.3 6-3v-5"/></svg>
          <span>SIA.Sat</span>
        </div>
        <div>
          <div class="k">NIM</div><div class="v">672025064</div>
          <div style="height:14px"></div>
          <div class="k">Nama</div><div class="v">Mikhael Gusti Hamurdani</div>
        </div>
        <div>
          <div class="k">Fakultas</div><div class="v">Teknik Informasi</div>
          <div style="height:14px"></div>
          <div class="k">Angkatan</div><div class="v">2025</div>
        </div>
        <div>
          <div class="k">No. HP</div><div class="v">081337408317</div>
          <div style="height:14px"></div>
          <div class="k">Status</div><div class="v"><span class="status-tag status-aktif">Aktif</span></div>
        </div>
        <div style="grid-column: 2 / span 3;">
          <div class="k">Program Studi</div><div class="v">Teknik Informatika</div>
        </div>
      </div>

      <div class="card">
        <div class="section-heading">
          <span class="step-num">1</span> Informasi Pengajuan
        </div>

        <form id="dispensasiForm" class="form-grid" novalidate>
          <div class="form-field">
            <label>Jenis Disepensasi</label>
            <select class="field" required>
              <option value="">-- pilih Jenis Dispensasi --</option>
              <option>Sakit</option>
              <option>Kegiatan Lomba</option>
              <option>Keperluan Keluarga</option>
              <option>Lainnya</option>
            </select>
          </div>
          <div class="form-field">
            <label>Perihal / Judul</label>
            <input class="field" type="text" placeholder="Contoh: Dispensasi karena sakit / Kegiatan Lomba">
          </div>

          <div class="form-field">
            <label>Tanggal Mulai Dispensasi</label>
            <input class="field" type="date" placeholder="dd/mm/yy">
          </div>
          <div class="form-field" style="grid-row: span 2;">
            <label>Keterangan Lengkap</label>
            <textarea class="field" placeholder="Jelaskan alasan pengajuan dispensasi secara detail....."></textarea>
          </div>

          <div class="form-field">
            <label>Tanggal Selesai Dispensasi</label>
            <input class="field" type="date" placeholder="dd/mm/yy">
          </div>

          <div style="grid-column:1/-1; display:flex; justify-content:center; margin-top:10px;">
            <button class="btn btn-primary" type="submit" style="max-width:240px;">Ajukan Dispensasi</button>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<script src="js/global.js"></script>
</body>
</html>
